name: Deploy to DigitalOcean VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ──── Copy toàn bộ code lên Server ────
      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "."
          target: "/app/gigwork"

      # ──── Lệnh chạy trên Server ────
      - name: Execute deployment commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /app/gigwork
            
            # Tạo file .env từ GitHub Secrets
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Tắt container cũ, build và chạy container mới
            docker compose down
            docker compose up -d --build
            
            # Dọn dẹp rác (images cũ) để tránh đầy ổ cứng
            docker image prune -f