name: Deploy to DigitalOcean VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ──── Copy toàn bộ code lên Server ────
      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "."
          target: "/app/gigwork"
          strip_components: 1

      # ──── Lệnh chạy trên Server ────
      - name: Execute deployment commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /app/gigwork
            
            # 1. create .env file
            echo "${{ secrets.ENV_FILE }}" > .env

            # 2. validate required DB env vars before touching containers
            if ! grep -q '^DB_HOST=' .env || ! grep -q '^DB_PORT=' .env || ! grep -q '^DB_USERNAME=' .env || ! grep -q '^DB_PASSWORD=' .env || ! grep -q '^DB_DATABASE=' .env; then
              echo "Missing one of DB_HOST/DB_PORT/DB_USERNAME/DB_PASSWORD/DB_DATABASE in ENV_FILE"
              exit 1
            fi
            
            # 3. Build image
            docker compose build --no-cache api
            
            # 4. start dependencies first
            docker compose up -d postgres redis

            # 5. keep Postgres password in DB role synced with .env (works even with existing volume)
            docker compose exec -T postgres sh -lc 'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v pg_user="$POSTGRES_USER" -v pg_pass="$POSTGRES_PASSWORD" -c "SELECT format('\''ALTER USER %I WITH PASSWORD %L'\'', :'\''pg_user'\'', :'\''pg_pass'\'') \\gexec"'

            # 6. start app/proxy after DB credentials are aligned
            docker compose up -d api caddy dozzle
            
            # 7. remove old image
            docker image prune -f
